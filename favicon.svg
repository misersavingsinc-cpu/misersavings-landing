<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark green rounded square (Miser brand color #1C3D2B) -->
  <rect width="100" height="100" rx="22" fill="#1C3D2B"/>

  <!-- Rosette rings, callback to the brand monogram. Visible at 32 plus,
       fade to nothing at 16x16. -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#C8A820" stroke-opacity="0.18" stroke-width="1.4"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#C8A820" stroke-opacity="0.34" stroke-width="1.2" stroke-dasharray="3 2.5"/>

  <!-- Brand defining glyph: gold dollar sign from the wordmark. -->
  <text x="50" y="50"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="62"
        fill="#C8A820"
        letter-spacing="-0.02em">$</text>
</svg>
